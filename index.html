<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMetrics | Risk Predictor</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
</head>

<body>

    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="glass-container">
        <h1>MindMetrics</h1>
        <p class="subtitle">AI-Powered Lifestyle Assessment</p>

        <div id="prediction-form" style="max-height: 50vh; overflow-y: auto; padding-right: 10px;">

            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" value="20" min="10" max="100">
            </div>
            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender">
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                </select>
            </div>

            <div class="form-group">
                <label for="dailySocial">Daily Social Media (Hours)</label>
                <input type="number" id="dailySocial" value="3.5" step="0.5">
            </div>
            <div class="form-group">
                <label for="platform">Primary Platform</label>
                <select id="platform">
                    <option value="Instagram">Instagram</option>
                    <option value="TikTok">TikTok</option>
                    <option value="Both">Both</option>
                </select>
            </div>
            <div class="form-group">
                <label for="screenTime">Screen Time Before Sleep (Hours)</label>
                <input type="number" id="screenTime" value="1.5" step="0.5">
            </div>

            <div class="form-group">
                <label for="sleepHours">Average Sleep (Hours)</label>
                <input type="number" id="sleepHours" value="7" step="0.5">
            </div>
            <div class="form-group">
                <label for="academic">Academic Performance (GPA/Score)</label>
                <input type="number" id="academic" value="3.0" step="0.1">
            </div>
            <div class="form-group">
                <label for="physical">Physical Activity (Hours/Day)</label>
                <input type="number" id="physical" value="1.0" step="0.5">
            </div>
            <div class="form-group">
                <label for="socialInteraction">Social Interaction Level</label>
                <select id="socialInteraction">
                    <option value="0">Low</option>
                    <option value="1" selected>Medium</option>
                    <option value="2">High</option>
                </select>
            </div>

            <div class="form-group">
                <label for="stressLevel">Stress Level (1-10): <span id="stressValue">5</span></label>
                <input type="range" id="stressLevel" min="1" max="10" value="5"
                    oninput="document.getElementById('stressValue').innerText = this.value">
            </div>
            <div class="form-group">
                <label for="anxietyLevel">Anxiety Level (1-10): <span id="anxietyValue">5</span></label>
                <input type="range" id="anxietyLevel" min="1" max="10" value="5"
                    oninput="document.getElementById('anxietyValue').innerText = this.value">
            </div>
            <div class="form-group">
                <label for="addictionLevel">Social Media Addiction Level (1-10): <span
                        id="addictionValue">5</span></label>
                <input type="range" id="addictionLevel" min="1" max="10" value="5"
                    oninput="document.getElementById('addictionValue').innerText = this.value">
            </div>

        </div>

        <button id="predict-btn" onclick="runPrediction()" disabled>Loading AI Engine...</button>

        <div id="result-container">
            <p>Estimated Risk Score</p>
            <div id="result-text">--%</div>
            <p id="error-log" class="error-text"></p>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
