<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MindMetrics | Risk Predictor</title>
    <!-- Link to your new CSS file -->
    <link rel="stylesheet" href="style.css">
    <!-- Import TensorFlow.js -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
</head>
<body>

    <!-- Ambient background glows for the glass effect to stand out -->
    <div class="ambient-glow glow-1"></div>
    <div class="ambient-glow glow-2"></div>

    <div class="glass-container">
        <h1>MindMetrics</h1>
        <p class="subtitle">AI-Powered Lifestyle Assessment</p>

        <div id="prediction-form">
            <div class="form-group">
                <label for="age">Age</label>
                <input type="number" id="age" value="20" min="10" max="100">
            </div>

            <div class="form-group">
                <label for="gender">Gender</label>
                <select id="gender">
                    <option value="female">Female</option>
                    <option value="male">Male</option>
                </select>
            </div>

            <div class="form-group">
                <label for="sleepHours">Average Sleep Hours</label>
                <input type="number" id="sleepHours" value="7" step="0.5">
            </div>

            <div class="form-group">
                <label for="stressLevel">Stress Level (1-10): <span id="stressValue">5</span></label>
                <input type="range" id="stressLevel" min="1" max="10" value="5" oninput="document.getElementById('stressValue').innerText = this.value">
            </div>

            <button id="predict-btn" onclick="runPrediction()" disabled>Loading AI Engine...</button>
        </div>

        <div id="result-container">
            <p>Estimated Risk Score</p>
            <div id="result-text">--%</div>
            <p id="error-log" class="error-text"></p>
        </div>
    </div>

    <!-- Link to your new JavaScript file -->
    <script src="script.js"></script>
</body>
</html>
